<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram WebApp Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #000;
            color: #fff;
        }
        .debug-info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #10b981;
        }
        .error {
            border-left-color: #ef4444;
        }
        pre {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Telegram WebApp Debug Tool</h1>
    <p>This tool helps debug Telegram WebApp integration issues.</p>
    
    <div id="debug-output"></div>
    
    <script>
        function addDebugInfo(title, content, isError = false) {
            const output = document.getElementById('debug-output');
            const div = document.createElement('div');
            div.className = `debug-info ${isError ? 'error' : ''}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <pre>${typeof content === 'object' ? JSON.stringify(content, null, 2) : content}</pre>
            `;
            output.appendChild(div);
        }
        
        // Check if Telegram WebApp is available
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            
            addDebugInfo('✅ Telegram WebApp Available', 'Telegram WebApp object is loaded');
            
            // Initialize WebApp
            tg.ready();
            tg.expand();
            
            // Debug basic info
            addDebugInfo('📱 Platform Info', {
                platform: tg.platform,
                version: tg.version,
                colorScheme: tg.colorScheme,
                themeParams: tg.themeParams
            });
            
            // Debug init data
            addDebugInfo('🔑 Init Data', {
                initData: tg.initData,
                initDataLength: tg.initData ? tg.initData.length : 0,
                hasInitData: !!tg.initData
            });
            
            // Debug user data
            addDebugInfo('👤 User Data', {
                initDataUnsafe: tg.initDataUnsafe,
                user: tg.initDataUnsafe?.user,
                hasUser: !!tg.initDataUnsafe?.user
            });
            
            // Test API call
            if (tg.initData) {
                addDebugInfo('🧪 Testing API Login', 'Attempting to login with Telegram data...');
                
                fetch('https://server-kl7c.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        init_data: tg.initData
                    })
                })
                .then(response => response.json())
                .then(data => {
                    addDebugInfo('✅ API Login Response', data);
                })
                .catch(error => {
                    addDebugInfo('❌ API Login Error', error.message, true);
                });
            } else {
                addDebugInfo('⚠️ No Init Data', 'Cannot test API login without init data', true);
            }
            
        } else {
            addDebugInfo('❌ Telegram WebApp Not Available', 'This page must be opened in Telegram', true);
        }
        
        // Add manual refresh button
        const refreshBtn = document.createElement('button');
        refreshBtn.textContent = '🔄 Refresh Debug Info';
        refreshBtn.style.cssText = 'padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 20px 0;';
        refreshBtn.onclick = () => location.reload();
        document.body.appendChild(refreshBtn);
    </script>
</body>
</html>
